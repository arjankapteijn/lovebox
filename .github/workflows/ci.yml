name: CI

# Lint + test op elke push naar main en op elke PR (incl. Dependabot), zodat
# dependency-PR's meteen groen/rood tonen. Draait op ubuntu en bewaart geen
# artifacts → blijft binnen het gratis Actions-tegoed.
on:
  push:
    branches: [main]
  pull_request:

# nieuwe push op dezelfde branch annuleert een nog lopende run
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12" # gelijk aan de runtime in de Dockerfile
          cache: pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: pytest
