# Self-scheduling container: draait continu en verstuurt dagelijks rond
# LOVEBOX_RUN_AT. Geen webserver → geen ports/proxy nodig.
#
# /data moet schrijfbaar zijn voor de non-root app-user (uid 10001): daar komt
# het heartbeat-bestand (voor de healthcheck) en de laatste preview. Gebruik
# een NAMED VOLUME — dat erft de juiste eigenaar (app:app) uit het image. Een
# tmpfs werkt hier NIET: die is niet schrijfbaar voor de app-user, waardoor de
# healthcheck faalt en de app op "deploying" blijft hangen.
#
# Updaten: met :latest + pull_policy always de app opnieuw deployen. Voor
# reproduceerbaarheid kun je ook een vaste tag pinnen (bijv. :0.3.1).
services:
  lovebox:
    image: ghcr.io/arjankapteijn/lovebox:latest
    container_name: lovebox
    pull_policy: always
    restart: unless-stopped
    env_file:
      - .env
    # Hardening (zelfde lijn als arjankapteijn.nl): non-root (in image),
    # read-only rootfs, geen extra capabilities, geen privilege-escalatie,
    # en bescheiden geheugen-/pids-limieten.
    read_only: true
    tmpfs:
      - /tmp:size=8m
    volumes:
      - lovebox-data:/data
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 256m
    pids_limit: 128

volumes:
  lovebox-data:
